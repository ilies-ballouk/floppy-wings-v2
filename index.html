<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#06060f"/>
<title>Floppy Wings</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{
  --cy:#00f5ff;--pk:#ff006e;--gn:#39ff14;--yw:#ffe600;--pu:#cc00ff;
  --bg:#06060f;--ground-top:#1a0a3e;
  --safe-top:env(safe-area-inset-top,12px);
  --safe-bot:env(safe-area-inset-bottom,10px);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Press Start 2P',monospace;touch-action:none;
  user-select:none;-webkit-user-select:none;}
canvas{display:block;image-rendering:pixelated;max-height:100dvh;max-width:100vw;}
#gameWrapper{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;}
#hudTop{
  position:absolute;top:calc(var(--safe-top) + 8px);left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:0 12px;opacity:0;transition:opacity .3s;
}
#hud.playing #hudTop{opacity:1;}
#hudScore{font-size:clamp(20px,6vw,30px);color:var(--yw);}
#hudRight{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
#hudCoins{font-size:clamp(8px,2.2vw,12px);color:var(--yw);}
#hudBest{font-size:clamp(7px,1.9vw,10px);color:rgba(255,230,0,.5);}
#hudDiff{font-size:clamp(7px,1.9vw,10px);color:var(--pk);}

/* Power-up bar */
#powerBar{
  position:absolute;bottom:calc(var(--safe-bot) + 14%);
  left:50%;transform:translateX(-50%);
  display:flex;gap:8px;opacity:0;transition:opacity .3s;
}
#hud.playing #powerBar{opacity:1;}
.pu-icon{
  width:clamp(28px,7vw,38px);height:clamp(28px,7vw,38px);
  border-radius:6px;border:2px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.5);display:flex;align-items:center;
  justify-content:center;font-size:clamp(13px,3.5vw,18px);
  position:relative;overflow:hidden;
}
.pu-icon .pu-timer{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--cy);transition:width .1s linear;
}
.pu-icon.inactive{opacity:.25;}

/* SCREENS */
.screen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  transition:opacity .35s;
}
.screen.hidden{opacity:0;pointer-events:none;}

/* MENU */
#menuScreen{}
#menuLogo{
  font-size:clamp(20px,6vw,32px);color:var(--cy);
  text-align:center;line-height:1.7;
  animation:pulse 2s ease-in-out infinite;
}
#menuStreak{font-size:clamp(8px,2.2vw,11px);color:var(--gn);}
#menuStats{font-size:clamp(7px,1.9vw,10px);color:rgba(255,255,255,.45);text-align:center;line-height:2;}
#menuCoins{font-size:clamp(10px,2.8vw,14px);color:var(--yw);}
#menuBest{font-size:clamp(8px,2.2vw,11px);color:rgba(255,230,0,.6);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,10px);
  padding:clamp(9px,2.5vw,14px) clamp(12px,4vw,22px);
  border:2px solid currentColor;background:rgba(0,0,0,.55);
  color:var(--cy);cursor:pointer;letter-spacing:1px;
  border-radius:5px;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.btn:active{background:rgba(0,245,255,.15);}
.btn.pk{color:var(--pk);border-color:var(--pk);}
.btn.yw{color:var(--yw);border-color:var(--yw);}
.btn.gn{color:var(--gn);border-color:var(--gn);}
.btn.pu{color:var(--pu);border-color:var(--pu);}
.btn.off{opacity:.3;pointer-events:none;}

/* DEAD */
#deadScreen .dead-title{font-size:clamp(14px,4vw,20px);color:var(--pk);animation:blink 1s step-end infinite;}
#deadScreen .dead-score{font-size:clamp(12px,3.5vw,18px);color:var(--yw);}
#deadScreen .dead-coins{font-size:clamp(9px,2.5vw,13px);color:var(--yw);}
#deadScreen .dead-best{font-size:clamp(8px,2.2vw,11px);color:rgba(255,230,0,.55);}
#deadScreen .dead-medal{font-size:clamp(30px,9vw,50px);}

/* OVERLAY PANELS */
.overlay{
  position:fixed;inset:0;background:rgba(6,6,15,.97);
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,3vw,20px);
  padding-top:calc(var(--safe-top) + 14px);
  overflow-y:auto;opacity:0;pointer-events:none;
  transition:opacity .3s;z-index:60;
}
.overlay.open{opacity:1;pointer-events:all;}
.overlay-title{font-size:clamp(13px,3.8vw,20px);color:var(--cy);margin-bottom:8px;letter-spacing:2px;}

/* SHOP */
#skinGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(100px,26vw,140px),1fr));
  gap:clamp(7px,2.5vw,14px);width:100%;max-width:580px;
}
.skin-card{
  background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);
  border-radius:8px;padding:clamp(7px,2vw,12px);
  display:flex;flex-direction:column;align-items:center;gap:7px;
}
.skin-card.active{border-color:var(--cy);}
.skin-name{font-size:clamp(5px,1.6vw,8px);color:#fff;text-align:center;line-height:1.6;}
.skin-price{font-size:clamp(6px,1.7vw,9px);color:var(--yw);}
.skin-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.4vw,7px);
  padding:4px 9px;border:1.5px solid currentColor;background:rgba(0,0,0,.5);
  cursor:pointer;border-radius:3px;-webkit-tap-highlight-color:transparent;
}
.skin-btn.equip{color:var(--cy);}
.skin-btn.buy{color:var(--yw);}
.skin-btn.eqd{color:var(--gn);border-color:var(--gn);}
.skin-btn.poor{color:#555;border-color:#333;pointer-events:none;}
.skin-ninja{border-color:rgba(200,200,200,.3);}
.ninja-lock{font-size:clamp(7px,1.9vw,10px);color:#888;text-align:center;}

/* UPGRADES */
#upgradeList{display:flex;flex-direction:column;gap:10px;width:100%;max-width:480px;}
.upg-card{
  background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);
  border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;
}
.upg-icon{font-size:20px;flex-shrink:0;}
.upg-info{flex:1;}
.upg-name{font-size:clamp(7px,2vw,10px);color:#fff;margin-bottom:4px;}
.upg-desc{font-size:clamp(5px,1.4vw,7px);color:#888;line-height:1.6;}
.upg-lvl{font-size:clamp(5px,1.3vw,7px);color:var(--cy);margin-top:3px;}
.upg-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.4vw,7px);
  padding:6px 10px;border:1.5px solid var(--yw);background:rgba(0,0,0,.5);
  color:var(--yw);cursor:pointer;border-radius:3px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.upg-btn:disabled{color:#444;border-color:#333;pointer-events:none;}
.upg-btn.maxed{color:var(--gn);border-color:var(--gn);}

/* STATS */
#statsList{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(255,255,255,.04);border-radius:6px;}
.stat-label{font-size:clamp(6px,1.7vw,9px);color:#aaa;}
.stat-val{font-size:clamp(8px,2.2vw,11px);color:var(--yw);}

/* DAILY */
#dailyBanner{
  position:fixed;top:0;left:0;right:0;
  background:linear-gradient(135deg,rgba(57,255,20,.15),rgba(0,245,255,.12));
  border-bottom:1px solid rgba(57,255,20,.3);
  padding:calc(var(--safe-top) + 8px) 16px 10px;
  text-align:center;z-index:80;
  transform:translateY(-100%);transition:transform .5s cubic-bezier(.17,.67,.35,1.1);
}
#dailyBanner.show{transform:translateY(0);}
#dailyBanner p{font-size:clamp(8px,2.2vw,12px);color:var(--gn);line-height:2;}
#dailyBanner .close-daily{
  position:absolute;right:12px;top:calc(var(--safe-top) + 8px);
  font-size:14px;color:#fff;cursor:pointer;background:none;border:none;
  font-family:'Press Start 2P',monospace;
}

/* NINJA UNLOCK */
#ninjaUnlock{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:90;opacity:0;pointer-events:none;transition:opacity .4s;
}
#ninjaUnlock.show{opacity:1;pointer-events:all;}
#ninjaUnlock .ninja-title{font-size:clamp(16px,5vw,26px);color:#fff;text-align:center;line-height:1.8;animation:pulse 1s ease-in-out infinite;}
#ninjaUnlock .ninja-emoji{font-size:clamp(50px,15vw,80px);}

/* PAUSE */
#pauseBanner{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:70;
}
#pauseBanner.show{opacity:1;}
#pauseBanner span{font-size:clamp(14px,4vw,22px);color:var(--cy);animation:blink 1.2s step-end infinite;}

/* COIN FLOAT */
.cfloat{
  position:fixed;pointer-events:none;
  font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.5vw,13px);
  color:var(--yw);animation:floatUp 1.1s ease-out forwards;z-index:55;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(.8);}}

/* NINJA SCORE BADGE */
#ninjaBadge{
  position:fixed;top:calc(var(--safe-top)+60px);left:50%;transform:translateX(-50%);
  font-size:clamp(7px,1.9vw,10px);color:#aaa;opacity:0;pointer-events:none;
  transition:opacity .4s;white-space:nowrap;text-align:center;
}
#ninjaBadge.pop{opacity:1;}

/* DIFF BADGE */
#diffBadge{
  position:fixed;top:calc(var(--safe-top)+48px);left:50%;transform:translateX(-50%);
  font-size:clamp(7px,1.9vw,10px);color:var(--pk);opacity:0;pointer-events:none;
  transition:opacity .4s;white-space:nowrap;
}
#diffBadge.pop{opacity:1;}

@keyframes blink{0%,100%{opacity:.85;}50%{opacity:0;}}
@keyframes pulse{0%,100%{opacity:.9;}50%{opacity:1;}}
</style>
</head>
<body>
<div id="gameWrapper"><canvas id="gameCanvas"></canvas></div>

<!-- HUD -->
<div id="hud">
  <div id="hudTop">
    <div id="hudScore">0</div>
    <div id="hudRight">
      <div id="hudCoins">🪙0</div>
      <div id="hudBest"></div>
      <div id="hudDiff">FACILE</div>
    </div>
  </div>
  <div id="powerBar">
    <div class="pu-icon inactive" id="pu0" title="Bouclier">🛡️<div class="pu-timer" style="width:0%"></div></div>
    <div class="pu-icon inactive" id="pu1" title="Slow">🐢<div class="pu-timer" style="width:0%"></div></div>
    <div class="pu-icon inactive" id="pu2" title="Super Flap">🪶<div class="pu-timer" style="width:0%"></div></div>

  </div>
</div>

<!-- MENU -->
<div class="screen" id="menuScreen">
  <div id="menuLogo">FLOPPY<br>WINGS</div>
  <div id="menuStreak"></div>
  <div id="menuCoins">🪙0</div>
  <div id="menuBest"></div>
  <div id="menuStats"></div>
  <div class="btn-row">
    <button class="btn yw" id="btnPlay">▶ JOUER</button>
    <button class="btn pk"  id="btnShop">🛒 SHOP</button>
  </div>
  <div class="btn-row">
    <button class="btn gn" id="btnUpg">⚡ UPGRADES</button>
    <button class="btn"    id="btnStats">📊 STATS</button>

</div>

<!-- DEAD -->
<div class="screen hidden" id="deadScreen">

  <div class="dead-best"  id="deadBest"></div>
  <div class="btn-row">
    <button class="btn yw" id="btnReplay">▶ REJOUER</button>
    <button class="btn"    id="btnDeadMenu">≡ MENU</button>
  </div>
</div>

<!-- PAUSE -->
<div id="pauseBanner"><span>⏸ PAUSE</span></div>

<!-- SHOP OVERLAY -->
<div class="overlay" id="shopOverlay">
  <div class="overlay-title">🛒 BOUTIQUE</div>
  <div style="font-size:clamp(9px,2.5vw,12px);color:var(--yw);margin-bottom:12px;">🪙 <span id="shopCoinsVal">0</span></div>
  <div id="skinGrid"></div>
  <div class="btn-row" style="margin-top:16px;"><button class="btn" id="btnCloseShop">← RETOUR</button></div>
</div>

<!-- UPGRADES OVERLAY -->
<div class="overlay" id="upgOverlay">
  <div class="overlay-title">⚡ UPGRADES</div>
  <div style="font-size:clamp(9px,2.5vw,12px);color:var(--yw);margin-bottom:12px;">🪙 <span id="upgCoinsVal">0</span></div>
  <div id="upgradeList"></div>
  <div class="btn-row" style="margin-top:16px;"><button class="btn" id="btnCloseUpg">← RETOUR</button></div>
</div>

<!-- STATS OVERLAY -->
<div class="overlay" id="statsOverlay">
  <div class="overlay-title">📊 STATISTIQUES</div>
  <div id="statsList"></div>
  <div class="btn-row" style="margin-top:16px;"><button class="btn" id="btnCloseStats">← RETOUR</button></div>
</div>

<!-- DAILY REWARD BANNER -->
<div id="dailyBanner">
  <p id="dailyMsg"></p>
  <button class="close-daily" id="btnCloseDailyBanner">✕</button>
</div>

<!-- NINJA UNLOCK SCREEN -->
<div id="ninjaUnlock">
  <div class="ninja-emoji">🥷</div>
  <div class="ninja-title">NINJA<br>DÉBLOQUÉ!</div>
  <div style="font-size:clamp(8px,2.2vw,11px);color:#aaa;text-align:center;line-height:2;">Score de 93 atteint !<br>Équipe le skin Ninja !</div>
  <button class="btn pu" id="btnNinjaEquip">ÉQUIPER</button>
  <button class="btn" id="btnNinjaClose">PLUS TARD</button>
</div>

<!-- DIFF / NINJA BADGES -->
<div id="diffBadge"></div>
<div id="ninjaBadge">🥷 NINJA : SCORE 93</div>

<script>
/* ═══════════════════════════════════════════════
   FLOPPY WINGS v3
   Skins · Shop · Power-ups · Worlds · Stats
   Daily Reward · Upgrades · Ninja · 60fps iOS
═══════════════════════════════════════════════ */

/* ── Sécurité canvas ─── */
function sa(v){return!isFinite(v)?0:Math.max(0,Math.min(1,v));}
function r(a,b){return a+Math.random()*(b-a);}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

/* ── Audio ─── */
let AC=null;
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function tone(freq,type,dur,vol,fEnd){
  try{
    const ac=getAC();if(!ac||ac.state==='suspended')return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;
    o.frequency.setValueAtTime(freq,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(fEnd||freq*.5,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur);
  }catch(e){}
}
const SFX={
  flap:()=>{tone(420,'sine',.08,.12);vib(8);},
  score:()=>tone(880,'square',.09,.10,600),
  coin:()=>tone(1200,'sine',.1,.08,900),
  die:()=>{tone(180,'sawtooth',.42,.20);vib(90);},
  buy:()=>tone(660,'triangle',.18,.12,1320),
  equip:()=>tone(440,'sine',.12,.08,880),
  pu:()=>tone(520,'sine',.15,.11,1040),
  level:()=>{tone(660,'square',.22,.12,1320);vib(35);},
  daily:()=>tone(880,'sine',.3,.12,1760),
  ninja:()=>{tone(220,'sawtooth',.5,.18,880);vib([60,30,60]);},
};

/* ── SAVE ─── */
const DEF_SAVE={
  best:0,coins:0,games:0,totalPipes:0,
  owned:['classic'],equipped:'classic',
  ninjaUnlocked:false,ninjaNotified:false,
  upgrades:{jump:0,gravity:0,speed:0},
  dailyLast:'',streak:0,
};
function loadSave(){
  try{const s=JSON.parse(localStorage.getItem('fwv3'));return s?{...DEF_SAVE,...s,upgrades:{...DEF_SAVE.upgrades,...(s.upgrades||{})}}:structuredClone(DEF_SAVE);}
  catch(e){return structuredClone(DEF_SAVE);}
}
function saveSave(){try{localStorage.setItem('fwv3',JSON.stringify(SV));}catch(e){}}
let SV=loadSave();

/* ── DAILY REWARD ─── */
function checkDaily(){
  const today=new Date().toDateString();
  if(SV.dailyLast===today)return null;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const streak=(SV.dailyLast===yesterday)?SV.streak+1:1;
  const coins=10+streak*5;
  SV.streak=streak;SV.dailyLast=today;SV.coins+=coins;
  saveSave();
  return{coins,streak};
}

/* ── UPGRADES DEF ─── */
const UPGRADES=[
  {id:'jump',icon:'🪶',name:'SUPER FLAP',desc:'Flap plus puissant',
   levels:[{cost:60,label:'+5% force'},{cost:120,label:'+10%'},{cost:200,label:'+15%'}]},
  {id:'gravity',icon:'🌙',name:'LÉGÈRETÉ',desc:'Gravité réduite',
   levels:[{cost:80,label:'-5% gravité'},{cost:150,label:'-10%'},{cost:250,label:'-15%'}]},
  {id:'speed',icon:'🐌',name:'RALENTI',desc:'Vitesse de base légèrement réduite',
   levels:[{cost:100,label:'-4% vitesse'},{cost:180,label:'-8%'},{cost:280,label:'-12%'}]},
];

/* ── SKINS DEF ─── */
const SKINS=[
  {id:'classic',name:'JAUNE\nCLASSIC',price:0,free:true,
   body:['#fff7a0','#ffe600','#ff8c00'],wing:'#ffc107',beak:'#ff6d00',cheek:'#ff8080',stroke:'#ff6600',trail:'#ffe600',ta:.28,fx:null},
  {id:'cyan',name:'NÉON\nCYAN',price:50,
   body:['#c0ffff','#00f5ff','#0070ff'],wing:'#00ccee',beak:'#0088ff',cheek:'#80f0ff',stroke:'#0055cc',trail:'#00f5ff',ta:.32,fx:null},
  {id:'pink',name:'NÉON\nROSE',price:80,
   body:['#ffbbee','#ff006e','#990044'],wing:'#ff44aa',beak:'#ff0055',cheek:'#ffaacc',stroke:'#cc0044',trail:'#ff006e',ta:.35,fx:null},
  {id:'ice',name:'GLACE\nARCTIC',price:90,
   body:['#e8f8ff','#88ddff','#1199cc'],wing:'#66ccee',beak:'#0077bb',cheek:'#aaeeff',stroke:'#0066aa',trail:'#88ddff',ta:.3,fx:'ice'},
  {id:'fire',name:'FEU\nDRAGON',price:130,
   body:['#ffeeaa','#ff6600','#cc2200'],wing:'#ff4400',beak:'#ff2200',cheek:'#ff9966',stroke:'#aa2200',trail:'#ff6600',ta:.42,fx:'fire'},
  {id:'galaxy',name:'GALAXIE\nCOSMOS',price:180,
   body:['#ddaaff','#9900ff','#440088'],wing:'#8800ee',beak:'#cc00ff',cheek:'#dd99ff',stroke:'#660099',trail:'#cc00ff',ta:.38,fx:'galaxy'},
  {id:'gold',name:'OR\nLÉGENDE',price:250,
   body:['#fffacc','#ffd700','#b8860b'],wing:'#ffc200',beak:'#cc8800',cheek:'#ffe566',stroke:'#aa7700',trail:'#ffd700',ta:.45,fx:'gold'},
  {id:'ninja',name:'NINJA\nSECRET',price:0,ninja:true,
   body:['#1a1a1a','#222222','#111111'],wing:'#333333',beak:'#cc0000',cheek:'#880000',stroke:'#000000',trail:'#cc0000',ta:.4,fx:'ninja'},
];

/* ── WORLDS ─── */
const WORLDS=[
  {name:'ESPACE',skyTop:'#05051a',skyBot:'#1a0a3e',lc:'#00f5ff',neb:[{x:.25,y:.2,r:.3,c:'rgba(80,0,200,.07)'},{x:.72,y:.45,r:.25,c:'rgba(0,80,200,.06)'}]},
  {name:'AURORE',skyTop:'#001a10',skyBot:'#003d1f',lc:'#39ff14',neb:[{x:.5,y:.25,r:.4,c:'rgba(0,255,100,.07)'},{x:.8,y:.5,r:.28,c:'rgba(100,255,0,.05)'}]},

const PU_DEF=[

/* ── COLOR UTILS ─── */
function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lerp(a,b,t){const ca=hex2rgb(a),cb=hex2rgb(b);return`rgb(${Math.round(ca[0]+(cb[0]-ca[0])*t)},${Math.round(ca[1]+(cb[1]-ca[1])*t)},${Math.round(ca[2]+(cb[2]-ca[2])*t)})`;}

/* ════════════════════════════════════════
   CANVAS OBJECTS
════════════════════════════════════════ */
class Stars{
  constructor(W,H){this.reset(W,H);}
  reset(W,H){this.W=W;this.H=H;this.s=Array.from({length:45},()=>({x:r(0,W),y:r(0,H*.72),rv:r(.3,1.8),a:r(.3,.8),tw:r(0,Math.PI*2),sp:r(.004,.02)}));}
  update(){for(const s of this.s){s.tw+=s.sp;s.a=.3+.5*Math.abs(Math.sin(s.tw));}}
  draw(ctx){ctx.fillStyle='#fff';for(const s of this.s){ctx.globalAlpha=sa(s.a);ctx.beginPath();ctx.arc(s.x,s.y,s.rv,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
}

class CoinDrop{
  constructor(x,y){this.x=x;this.y=y;this.vx=r(-1.5,1.5);this.vy=r(-2,-4);this.life=1.3;this.r=6;this.done=false;}
  update(gravity){this.vy+=gravity*.4;this.x+=this.vx;this.y+=this.vy;this.life-=.025;if(this.life<=0)this.done=true;}
  draw(ctx){if(this.life<=0)return;ctx.globalAlpha=sa(this.life);ctx.fillStyle='#ffe600';ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=sa(this.life*.7);ctx.strokeStyle='#ff8c00';ctx.lineWidth=1.5;ctx.stroke();ctx.globalAlpha=1;}
}

class PowerUpItem{
  constructor(x,y,type){this.x=x;this.y=y;this.type=type;this.r=14;this.phase=0;this.collected=false;this.offscreen=false;}
  update(speed){this.x-=speed;this.phase+=.06;this.y+=Math.sin(this.phase)*0.6;if(this.x+this.r*2<0)this.offscreen=true;}
  draw(ctx){
    if(this.collected)return;
    const def=PU_DEF[this.type];
    ctx.globalAlpha=.85+.15*Math.abs(Math.sin(this.phase));
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath();ctx.arc(this.x,this.y,this.r+2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=def.color;ctx.lineWidth=2;ctx.stroke();
    ctx.font=`${this.r*1.2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(def.icon,this.x,this.y);
    ctx.globalAlpha=1;
  }
  hits(bx,by,br){return Math.hypot(this.x-bx,this.y-by)<this.r+br;}
}

class Particle{
  constructor(x,y,color){
    this.x=x;this.y=y;
    const a=r(0,Math.PI*2),sp=r(1.5,5.5);
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-2;
    this.life=1;this.color=color||'#ffe600';this.rv=r(2,6);
  }
  update(){this.x+=this.vx;this.vy+=.28;this.y+=this.vy;this.life-=.05;}
  draw(ctx){if(this.life<=0)return;ctx.globalAlpha=sa(this.life);ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.5,this.rv*this.life),0,Math.PI*2);ctx.fill();}
}

class Ground{
  constructor(H,gh){this.H=H;this.gh=gh;this.off=0;this._g=null;}
  update(sp,mv){if(mv)this.off=(this.off+sp)%40;}
  draw(ctx,W){
    const y=this.H-this.gh;
    if(!this._g){this._g=ctx.createLinearGradient(0,y,0,this.H);this._g.addColorStop(0,'#1a0a3e');this._g.addColorStop(1,'#0a0520');}
    ctx.fillStyle=this._g;ctx.fillRect(0,y,W,this.gh);
    ctx.strokeStyle='#7c00ff';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.strokeStyle='rgba(124,0,255,.18)';ctx.lineWidth=1;ctx.beginPath();
    for(let x=-this.off;x<W;x+=40){ctx.moveTo(x,y);ctx.lineTo(x,this.H);}
    for(let row=y+20;row<this.H;row+=20){ctx.moveTo(0,row);ctx.lineTo(W,row);}
    ctx.stroke();
  }
}

class Bird{
  constructor(x,y,sz){
    this.sx=x;this.sy=y;this.sz=sz;
    this.skinId=SV.equipped;this.ph=0;
    this.reset();
  }
  reset(){
    this.x=this.sx;this.y=this.sy;this.vy=0;this.angle=0;
    this.wa=0;this.wd=1;this.trail=[];this.alive=true;
    this.stunned=false;this.dt=0;this.ph=0;
    this.shieldHp=0; // shield power-up
  }
  flap(grav,flapMult){
    if(!this.alive||this.stunned)return;
    this.vy=-grav*10.5*flapMult;this.wa=-.8;SFX.flap();
  }
  stun(){this.stunned=true;this.vy=2;SFX.die();}
  update(grav,H,gh){
    this.ph+=.07;
    if(!this.alive){
      this.vy+=grav;this.y+=this.vy;
      if(!isFinite(this.y))this.y=H-gh-this.sz/2;
      this.angle=Math.min(1.5,this.angle+.08);
      const gy=H-gh-this.sz/2;if(this.y>=gy){this.y=gy;this.vy=0;}return;
    }
    this.vy+=grav;this.y+=this.vy;
    if(!isFinite(this.y))this.y=this.sy;
    this.angle=Math.max(-.5,Math.min(1.2,this.vy*.07));
    if(this.y-this.sz/2<=0){this.y=this.sz/2;this.vy=0;if(!this.stunned)this.stun();return;}
    if(this.y+this.sz/2>=H-gh){this.y=H-gh-this.sz/2;this.alive=false;this.stunned=false;return;}
    if(!this.stunned){
      this.wa+=this.wd*.18;if(this.wa>.5)this.wd=-1;if(this.wa<-.8)this.wd=1;
      this.trail.unshift({x:this.x,y:this.y});if(this.trail.length>5)this.trail.pop();
    }
  }
  draw(ctx){
    const s=this.sz;
    const sk=SKINS.find(x=>x.id===this.skinId)||SKINS[0];
    let ba=1;
    if(sk.fx==='ice')ba=.8+.2*Math.abs(Math.sin(this.ph*.5));
    if(sk.fx==='ninja')ba=.85+.15*Math.abs(Math.sin(this.ph*.8));

    // Shield ring
    if(this.shieldHp>0){
      ctx.globalAlpha=sa(.4+.2*Math.abs(Math.sin(this.ph*2)));
      ctx.strokeStyle='#00f5ff';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(this.x,this.y,s*.72,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    }

    // Trail
    if(this.alive&&!this.stunned&&this.trail.length){
      ctx.fillStyle=sk.trail;
      for(let i=0;i<this.trail.length;i++){
        const t=this.trail[i];ctx.globalAlpha=sa((1-i/5)*sk.ta);
        ctx.beginPath();ctx.ellipse(t.x,t.y,s*.28,s*.18,0,0,Math.PI*2);ctx.fill();
      }ctx.globalAlpha=1;
    }

    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    ctx.globalAlpha=sa(ba);

    // FX: fire ember
    if(sk.fx==='fire'){
      ctx.globalAlpha=sa(.3*Math.abs(Math.sin(this.ph*2)));ctx.fillStyle='#ffee00';
      ctx.beginPath();ctx.ellipse(-s*.15,-s*.35,s*.12,s*.2,Math.sin(this.ph)*.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=sa(ba);
    }
    // FX: ice
    if(sk.fx==='ice'){
      ctx.globalAlpha=sa(.25*Math.abs(Math.sin(this.ph)));ctx.strokeStyle='#ffffff';ctx.lineWidth=s*.04;
      for(let i=0;i<3;i++){const a=this.ph+i*Math.PI*2/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*s*.6,Math.sin(a)*s*.6);ctx.stroke();}
      ctx.globalAlpha=sa(ba);
    }

    // Body
    const bg=ctx.createRadialGradient(-s*.1,-s*.1,s*.05,0,0,s*.52);
    bg.addColorStop(0,sk.body[0]);bg.addColorStop(.6,sk.body[1]);bg.addColorStop(1,sk.body[2]);
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,s*.52,s*.42,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=sk.stroke;ctx.lineWidth=s*.05;ctx.stroke();

    // FX: galaxy sparkles
    if(sk.fx==='galaxy'){
      ctx.globalAlpha=sa(.35*Math.abs(Math.sin(this.ph)));ctx.fillStyle='#fff';
      for(let i=0;i<4;i++){const a=this.ph+i*Math.PI/2;ctx.beginPath();ctx.arc(Math.cos(a)*s*.28,Math.sin(a)*s*.2,s*.04,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=sa(ba);
    }
    // FX: gold shimmer
    if(sk.fx==='gold'){
      ctx.globalAlpha=sa(.18+.22*Math.abs(Math.sin(this.ph*1.5)));
      ctx.strokeStyle='#fffaaa';ctx.lineWidth=s*.08;
      ctx.beginPath();ctx.ellipse(0,0,s*.58,s*.48,0,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=sa(ba);
    }
    // FX: ninja — white eyes
    if(sk.fx==='ninja'){
      ctx.globalAlpha=sa(.6+.4*Math.abs(Math.sin(this.ph)));ctx.fillStyle='#cc0000';
      ctx.fillRect(-s*.1,-s*.05,s*.22,s*.08);// headband
      ctx.globalAlpha=sa(ba);
    }

    // Wing
    ctx.rotate(this.wa);ctx.fillStyle=sk.wing;
    ctx.beginPath();ctx.ellipse(-s*.1,s*.15,s*.28,s*.16,-.3,0,Math.PI*2);ctx.fill();
    ctx.rotate(-this.wa);

    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s*.22,-s*.1,s*.17,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=sk.fx==='ninja'?'#cc0000':'#1a1a1a';
    ctx.beginPath();ctx.arc(s*.27,-s*.08,s*.09,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s*.30,-s*.12,s*.04,0,Math.PI*2);ctx.fill();

    // Beak
    ctx.fillStyle=sk.beak;ctx.beginPath();ctx.moveTo(s*.45,-s*.04);ctx.lineTo(s*.72,s*.02);ctx.lineTo(s*.45,s*.1);ctx.closePath();ctx.fill();

    // Cheek
    ctx.globalAlpha=.42;ctx.fillStyle=sk.cheek;ctx.beginPath();ctx.ellipse(s*.15,s*.1,s*.12,s*.07,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  }
  getR(){return this.sz*.38;}
}

class Pipe{
  constructor(x,gap,gy,W,H,gh,pw){this.x=x;this.gap=gap;this.gy=gy;this.W=W;this.H=H;this.gh=gh;this.pw=pw;this.scored=false;this.speed=0;}
  update(){this.x-=this.speed;}
  gone(){return this.x+this.pw<0;}
  draw(ctx){
    const pw=this.pw,ch=pw*.28,tb=this.gy-this.gap/2,bt=this.gy+this.gap/2,gt=this.H-this.gh;
    this._p(ctx,this.x,0,pw,tb,ch,true);this._p(ctx,this.x,bt,pw,gt-bt,ch,false);
  }
  _p(ctx,x,y,w,h,ch,top){
    if(h<=0)return;
    const ix=x+w*.1,iw=w*.8,by=top?y:y+ch,bh=top?h-ch:h-ch;
    if(bh>0){ctx.fillStyle='#00a040';ctx.fillRect(ix,by,iw,bh);ctx.fillStyle='rgba(100,255,160,.18)';ctx.fillRect(ix+iw*.1,by,iw*.2,bh);}
    const cy=top?h-ch:y;ctx.fillStyle='#00c853';ctx.beginPath();
    if(top)ctx.roundRect(x,cy,w,ch,[0,0,5,5]);else ctx.roundRect(x,cy,w,ch,[5,5,0,0]);ctx.fill();
    ctx.fillStyle='rgba(180,255,200,.22)';ctx.beginPath();
    if(top)ctx.roundRect(x+w*.1,cy+3,w*.2,ch-6,[0,0,3,3]);else ctx.roundRect(x+w*.1,cy+3,w*.2,ch-6,[3,3,0,0]);ctx.fill();
  }
  hits(cx,cy,cr){
    if(cx+cr>this.x&&cx-cr<this.x+this.pw){if(cy-cr<this.gy-this.gap/2||cy+cr>this.gy+this.gap/2)return true;}return false;
  }
}

/* ════════════════════════════════════════
   GAME CLASS
════════════════════════════════════════ */
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

class Game{
  constructor(W,H){
    this.state='menu';this.paused=false;
    this.parts=[];this.coinDrops=[];this.puItems=[];
    this.flash=0;
    this.activePU={shield:0,slow:0,flap:0,magnet:0};
    this._build(W,H);
  }
  _build(W,H){
    this.W=W;this.H=H;
    this.gh=Math.max(60,H*.1);
    this.bsz=Math.min(W,H)*.09;
    this.pw=Math.min(W*.14,72);
    this.basePG=Math.min(H*.32,210);
    this.baseGrav=H*.00055;
    this.baseSpd=W*.0065;

    this.stars=new Stars(W,H);
    this.ground=new Ground(H,this.gh);
    this.bird=new Bird(W*.25,H*.45,this.bsz);
    this.pipes=[];

    this.score=0;this.sessionCoins=0;this.speed=this.baseSpd;
    this.fc=0;this.diffLv=DIFFS[0];this.prevDiffAt=-1;
    this.pipeGap=this.basePG;this.sepPx=W*.75;this.nextPX=W+this.pw;

    this.wi=0;this.wt=1;this.wTransing=false;this.wLabelA=0;this.wLabelT=0;
    this._bgG=null;this._bgGK='';

    this.puTimer=0;this.nextPuScore=Math.floor(r(3,7));
    this.coinTimer=0;
    this.flapMult=1;this.gravMult=1;this.spdMult=1;
    this._applyUpgrades();
  }
  _applyUpgrades(){
    const u=SV.upgrades;
    this.flapMult=1+u.jump*.05;
    this.gravMult=1-u.gravity*.05;
    this.spdMult=1-u.speed*.04;
  }
  resize(W,H){const wp=this.state==='playing';this._build(W,H);if(wp)this.startGame();}

  /* ── GAME START ── */
  startGame(){
    this._applyUpgrades();
    this.bird=new Bird(this.W*.25,this.H*.45,this.bsz);
    this.pipes=[];this.parts=[];this.coinDrops=[];this.puItems=[];
    this.score=0;this.sessionCoins=0;this.speed=this.baseSpd*this.spdMult;
    this.fc=0;this.flash=0;
    this.activePU={shield:0,slow:0,flap:0,magnet:0};
    this.diffLv=DIFFS[0];this.prevDiffAt=-1;
    this.pipeGap=this.basePG;this.sepPx=this.W*.75;this.nextPX=this.W+this.pw;
    this.wi=0;this.wt=1;this.wTransing=false;this.wLabelA=0;this.wLabelT=0;
    this._bgG=null;this._bgGK='';
    this.nextPuScore=Math.floor(r(3,7));
    this.puTimer=0;

    this.state='playing';
    SV.games++;saveSave();
    showScreen(null);
    document.getElementById('hud').classList.add('playing');
    document.getElementById('hudScore').textContent='0';
    document.getElementById('hudDiff').textContent=DIFFS[0].name;
    this._updateHudPU();
  }

  tap(){
    if(anyOverlayOpen())return;
    if(this.paused){this._unpause();return;}
    if(this.state==='menu'||this.state==='dead'){this.startGame();return;}
    if(this.state==='playing'&&this.bird.alive)this.bird.flap(this.grav(),this.flapMult*(1+(this.activePU.flap>0?.25:0)));
  }

  grav(){return this.baseGrav*this.gravMult*(this.activePU.slow>0?.55:1);}
  spd(){return this.speed*(this.activePU.slow>0?.5:1);}

  spawnPipe(){
    const mY=this.H*.22,xY=this.H-this.gh-this.pipeGap*.6;
    const gY=mY+Math.random()*(xY-mY);
    const p=new Pipe(this.nextPX,this.pipeGap,gY,this.W,this.H,this.gh,this.pw);
    p.speed=this.spd();this.pipes.push(p);this.nextPX+=this.sepPx;
  }

  spawnPU(){
    const type=Math.floor(r(0,PU_DEF.length));
    const mY=this.H*.2,xY=this.H-this.gh-50;
    const y=mY+Math.random()*(xY-mY);
    this.puItems.push(new PowerUpItem(this.W+30,y,type));
  }

  activatePU(type){
    const def=PU_DEF[type];
    if(def.id==='shield')this.activePU.shield=def.dur;
    else if(def.id==='slow')this.activePU.slow=def.dur;
    else if(def.id==='flap')this.activePU.flap=def.dur;
    else if(def.id==='magnet')this.activePU.magnet=def.dur;
    SFX.pu();vib(25);
    this._updateHudPU();
  }
  _tickPU(dt){
    const ids=['shield','slow','flap','magnet'];
    for(const id of ids){if(this.activePU[id]>0){this.activePU[id]-=dt;if(this.activePU[id]<0)this.activePU[id]=0;}}
    this._updateHudPU();
  }
  _updateHudPU(){
    const defs=['shield','slow','flap','magnet'];
    defs.forEach((id,i)=>{
      const el=document.getElementById(`pu${i}`);
      const rem=this.activePU[id];const dur=PU_DEF[i].dur;
      if(rem>0){el.classList.remove('inactive');el.querySelector('.pu-timer').style.width=(rem/dur*100)+'%';}
      else{el.classList.add('inactive');el.querySelector('.pu-timer').style.width='0%';}
    });
  }

  _applyDiff(){
    const d=getDiff(this.score);
    if(d.at!==this.prevDiffAt){
      this.prevDiffAt=d.at;this.diffLv=d;
      this.speed=this.baseSpd*d.spm*this.spdMult;
      this.pipeGap=Math.max(this.basePG*d.gm,this.H*.18);
      this.sepPx=Math.max(this.W*.75*d.sepm,this.W*.55);
      document.getElementById('hudDiff').textContent=d.name;
      showDiffBadge(d.name);SFX.level();
    } else {
      this.speed=Math.min(this.baseSpd*this.diffLv.spm*1.1*this.spdMult,this.baseSpd*this.diffLv.spm*this.spdMult+this.score*.003);
    }
  }

  _coinsFor(score){let c=1;if(score%10===0)c+=3;if(score%20===0)c+=7;return c;}

  _pause(){if(this.state!=='playing'||!this.bird.alive)return;this.paused=true;document.getElementById('pauseBanner').classList.add('show');}
  _unpause(){this.paused=false;document.getElementById('pauseBanner').classList.remove('show');}

  lastTs=0;
  update(ts){
    const dt=Math.min(ts-this.lastTs,50);this.lastTs=ts;
    if(this.paused)return;
    this.stars.update();
    if(this.state!=='playing')return;
    this.fc++;
    this._applyDiff();
    this._tickPU(dt);

    const grav=this.grav(),spd=this.spd();
    const mv=this.bird.alive&&!this.bird.stunned;

    // Pipes
    if(mv){for(const p of this.pipes){p.speed=spd;p.update();}}
    this.pipes=this.pipes.filter(p=>!p.gone());
    if(mv){
      if(!this.pipes.length){this.nextPX=this.W+this.pw;this.spawnPipe();}
      this.nextPX-=spd;
      if(this.nextPX<=this.W+this.pw){this.nextPX=this.W+this.pw+this.sepPx;this.spawnPipe();}
    }

    // PU items
    for(const pu of this.puItems){pu.update(spd);}
    this.puItems=this.puItems.filter(p=>!p.offscreen&&!p.collected);

    this.bird.update(grav,this.H,this.gh);
    this.ground.update(spd,mv);

    // Scoring
    if(this.bird.alive){
      for(const p of this.pipes){
        if(!p.scored&&p.x+p.pw<this.bird.x){
          p.scored=true;this.score++;
          SV.totalPipes++;
          document.getElementById('hudScore').textContent=this.score;
          SFX.score();

          const earned=this._coinsFor(this.score);
          this.sessionCoins+=earned;SV.coins+=earned;
          if(this.score>SV.best)SV.best=this.score;
          saveSave();
          document.getElementById('hudCoins').textContent='🪙'+SV.coins;
          document.getElementById('hudBest').textContent=SV.best>0?'↑'+SV.best:'';

          showCoinFloat(this.bird.x,this.bird.y-this.bsz,earned);SFX.coin();

          // Ninja check
          if(this.score>=93&&!SV.ninjaUnlocked){SV.ninjaUnlocked=true;saveSave();this._unlockNinja();}

          // World change
          if(this.score%20===0){
            this.wi=Math.min(this.wi+1,WORLDS.length-1);
            this.wt=0;this.wTransing=true;this.wLabelT=120;
            this._bgG=null;this._bgGK='';
          }

          // PU spawn
          if(this.score>=this.nextPuScore){this.spawnPU();this.nextPuScore=this.score+Math.floor(r(4,9));}
        }
      }

      // PU collision
      for(const pu of this.puItems){
        if(!pu.collected&&pu.hits(this.bird.x,this.bird.y,this.bird.getR())){
          pu.collected=true;this.activatePU(pu.type);
        }
      }
    }

    // World transition
    if(this.wTransing){this.wt=Math.min(1,this.wt+.012);if(this.wt>=1)this.wTransing=false;}
    if(this.wLabelT>0){this.wLabelT--;const t=this.wLabelT/120;this.wLabelA=t<.2?t/.2:t>.8?(1-t)/.2:1;}
    else this.wLabelA=0;

    // Collisions pipes
    if(this.bird.alive&&!this.bird.stunned){
      const cr=this.bird.getR();
      for(const p of this.pipes){
        if(p.hits(this.bird.x,this.bird.y,cr)){
          if(this.activePU.shield>0){
            this.activePU.shield=0;this._updateHudPU();vib(30);
          } else {
            this.bird.stun();this.explode(this.bird.x,this.bird.y);
          }break;
        }
      }
    }

    // Magnet: attract coin drops
    if(this.activePU.magnet>0){
      for(const cd of this.coinDrops){
        const dx=this.bird.x-cd.x,dy=this.bird.y-cd.y,dist=Math.hypot(dx,dy)||1;
        if(dist<120){cd.vx+=dx/dist*1.5;cd.vy+=dy/dist*1.5;}
      }
    }

    // Death
    if(!this.bird.alive){
      this.bird.dt++;
      if(this.bird.dt>=90){
        this.state='dead';
        document.getElementById('hud').classList.remove('playing');
        showDeadScreen(this.score,this.sessionCoins);
      }
    }

    if(this.flash>0)this.flash--;

    // Particles
    if(this.bird.alive||this.bird.dt<30){
      this.parts=this.parts.filter(p=>p.life>0);for(const p of this.parts)p.update();
    } else this.parts=[];

    this.coinDrops=this.coinDrops.filter(cd=>!cd.done);
    for(const cd of this.coinDrops)cd.update(grav);

    // Ninja badge hint
    if(this.state==='playing'&&this.score>=85&&this.score<93&&!SV.ninjaUnlocked){
      document.getElementById('ninjaBadge').classList.add('pop');
    } else document.getElementById('ninjaBadge').classList.remove('pop');
  }

  explode(x,y){
    const sk=SKINS.find(s=>s.id===SV.equipped)||SKINS[0];
    const cols=[sk.body[1],sk.trail,'#fff','#ff006e','#00f5ff'];
    for(let i=0;i<12;i++)this.parts.push(new Particle(x,y,cols[i%cols.length]));
    this.flash=6;
  }

  _unlockNinja(){
    if(SV.ninjaNotified)return;
    SV.ninjaNotified=true;saveSave();
    SFX.ninja();
    setTimeout(()=>document.getElementById('ninjaUnlock').classList.add('show'),1500);
  }

  drawBg(){
    const wi=this.wi,wp=Math.max(0,wi-1);
    const t=this.wTransing?this.wt:1;
    const w0=WORLDS[wp],w1=WORLDS[wi];
    const st=lerp(w0.skyTop,w1.skyTop,t),sb=lerp(w0.skyBot,w1.skyBot,t);
    const key=st+sb;
    if(key!==this._bgGK){
      this._bgG=ctx.createLinearGradient(0,0,0,this.H-this.gh);
      this._bgG.addColorStop(0,st);this._bgG.addColorStop(1,sb);this._bgGK=key;
    }
    ctx.fillStyle=this._bgG;ctx.fillRect(0,0,this.W,this.H);
    for(const n of w1.neb){
      ctx.globalAlpha=sa(t);
      const g=ctx.createRadialGradient(this.W*n.x,this.H*n.y,0,this.W*n.x,this.H*n.y,this.W*n.r);
      g.addColorStop(0,n.c);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.W*n.x,this.H*n.y,this.W*n.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(this.wLabelA>.01){
      const nm=WORLDS[wi].name;let fs=Math.round(this.W*.042);
      ctx.globalAlpha=sa(this.wLabelA);ctx.fillStyle=WORLDS[wi].lc;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=`bold ${fs}px 'Press Start 2P',monospace`;
      while(ctx.measureText(nm).width>this.W*.88&&fs>7){fs--;ctx.font=`bold ${fs}px 'Press Start 2P',monospace`;}
      ctx.fillText(nm,this.W/2,this.H-this.gh/2);ctx.globalAlpha=1;
    }
  }

  draw(){
    ctx.clearRect(0,0,this.W,this.H);
    if(this.flash>0&&this.flash%2===0){ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(0,0,this.W,this.H);}
    this.drawBg();this.stars.draw(ctx);
    for(const p of this.pipes)p.draw(ctx);
    this.ground.draw(ctx,this.W);
    for(const pu of this.puItems)pu.draw(ctx);
    this.bird.draw(ctx);
    if(this.parts.length){for(const p of this.parts)p.draw(ctx);ctx.globalAlpha=1;}
    for(const cd of this.coinDrops)cd.draw(ctx);
    ctx.globalAlpha=1;
  }

  loop(ts=0){
    try{this.update(ts);this.draw();}catch(e){console.warn('loop:',e);}
    requestAnimationFrame(t=>this.loop(t));
  }
}

/* ════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════ */
function showScreen(id){
  ['menuScreen','deadScreen'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  if(id)document.getElementById(id).classList.remove('hidden');
}

function showDeadScreen(score,coins){
  let medal='';
  if(score>=93)medal='🥷';else if(score>=30)medal='🏆';else if(score>=15)medal='🥇';else if(score>=7)medal='🥈';else if(score>=3)medal='🥉';
  document.getElementById('deadMedal').textContent=medal;
  document.getElementById('deadScore').textContent='SCORE: '+score;
  document.getElementById('deadCoins').textContent='+🪙'+coins;
  document.getElementById('deadBest').textContent=SV.best>0?'MEILLEUR: '+SV.best:'';
  showScreen('deadScreen');
}

function showMenu(){
  document.getElementById('menuCoins').textContent='🪙 '+SV.coins+' PIÈCES';
  document.getElementById('menuBest').textContent=SV.best>0?'MEILLEUR: '+SV.best:'';
  const str=SV.streak>1?`🔥 STREAK: ${SV.streak} JOURS`:'';
  document.getElementById('menuStreak').textContent=str;
  document.getElementById('menuStats').textContent=`${SV.games} parties · ${SV.totalPipes} tuyaux`;
  showScreen('menuScreen');
}

function anyOverlayOpen(){
  return ['shopOverlay','upgOverlay','statsOverlay'].some(id=>document.getElementById(id).classList.contains('open'))
    ||document.getElementById('ninjaUnlock').classList.contains('show');
}

function showDiffBadge(name){
  const el=document.getElementById('diffBadge');
  el.textContent='▲ '+name;el.classList.add('pop');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('pop'),2200);
}

function showCoinFloat(x,y,val){
  const el=document.createElement('div');el.className='cfloat';
  el.textContent='+'+val+'🪙';
  // Position relative to canvas rect
  const rect=canvas.getBoundingClientRect();
  const scaleX=rect.width/canvas.width,scaleY=rect.height/canvas.height;
  el.style.left=(rect.left+x*scaleX-20)+'px';
  el.style.top=(rect.top+y*scaleY)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

/* ── SKIN PREVIEW ── */
function drawSkinPreview(c2,skin,sz){
  const ct=c2.getContext('2d');ct.clearRect(0,0,sz,sz);
  const cx=sz/2,cy=sz/2,s=sz*.75;
  const bg=ct.createRadialGradient(cx-s*.1,cy-s*.1,s*.05,cx,cy,s*.52);
  bg.addColorStop(0,skin.body[0]);bg.addColorStop(.6,skin.body[1]);bg.addColorStop(1,skin.body[2]);
  ct.fillStyle=bg;ct.beginPath();ct.ellipse(cx,cy,s*.52,s*.42,0,0,Math.PI*2);ct.fill();
  ct.strokeStyle=skin.stroke;ct.lineWidth=s*.05;ct.stroke();
  ct.fillStyle=skin.wing;ct.beginPath();ct.ellipse(cx-s*.1,cy+s*.15,s*.28,s*.16,-.3,0,Math.PI*2);ct.fill();
  ct.fillStyle='#fff';ct.beginPath();ct.arc(cx+s*.22,cy-s*.1,s*.17,0,Math.PI*2);ct.fill();
  ct.fillStyle=skin.fx==='ninja'?'#cc0000':'#1a1a1a';ct.beginPath();ct.arc(cx+s*.27,cy-s*.08,s*.09,0,Math.PI*2);ct.fill();
  ct.fillStyle=skin.beak;ct.beginPath();ct.moveTo(cx+s*.45,cy-s*.04);ct.lineTo(cx+s*.72,cy+s*.02);ct.lineTo(cx+s*.45,cy+s*.1);ct.closePath();ct.fill();
}

/* ── SHOP ── */
function renderShop(){
  document.getElementById('shopCoinsVal').textContent=SV.coins;
  const grid=document.getElementById('skinGrid');grid.innerHTML='';
  for(const sk of SKINS){
    const owned=SV.owned.includes(sk.id);
    const eqd=SV.equipped===sk.id;
    const isNinja=sk.ninja;
    const ninjaLocked=isNinja&&!SV.ninjaUnlocked;

    const card=document.createElement('div');
    card.className='skin-card'+(eqd?' active':'')+(isNinja?' skin-ninja':'');

    const pv=document.createElement('canvas');pv.width=56;pv.height=56;pv.style.cssText='width:clamp(44px,11vw,56px);height:clamp(44px,11vw,56px);';
    if(!ninjaLocked)drawSkinPreview(pv,sk,56);else{const c=pv.getContext('2d');c.fillStyle='#222';c.fillRect(0,0,56,56);c.font='28px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('🔒',28,28);}

    const nm=document.createElement('div');nm.className='skin-name';nm.textContent=sk.name;
    const pr=document.createElement('div');pr.className='skin-price';
    const btn=document.createElement('button');btn.className='skin-btn';

    if(ninjaLocked){
      pr.textContent='SCORE: 93';
      const lock=document.createElement('div');lock.className='ninja-lock';lock.textContent='MYSTÈRE';
      btn.className='skin-btn poor';btn.textContent='🔒 VERROUILLÉ';
      card.append(pv,nm,lock,pr,btn);
    } else {
      pr.textContent=sk.free||sk.ninja?'GRATUIT':'🪙 '+sk.price;
      if(eqd){btn.className='skin-btn eqd';btn.textContent='✓ ÉQUIPÉ';}
      else if(owned||sk.ninja){btn.className='skin-btn equip';btn.textContent='ÉQUIPER';}
      else if(SV.coins>=sk.price){btn.className='skin-btn buy';btn.textContent='ACHETER';}
      else{btn.className='skin-btn poor';btn.textContent='🪙'+sk.price;}
      btn.addEventListener('click',()=>{
        if(eqd)return;
        if(owned||sk.ninja){SV.equipped=sk.id;if(!SV.owned.includes(sk.id))SV.owned.push(sk.id);saveSave();SFX.equip();renderShop();}
        else if(SV.coins>=sk.price){SV.coins-=sk.price;SV.owned.push(sk.id);SV.equipped=sk.id;saveSave();SFX.buy();vib(25);renderShop();}
      });
      card.append(pv,nm,pr,btn);
    }
    grid.appendChild(card);
  }
}

/* ── UPGRADES ── */
function renderUpgrades(){
  document.getElementById('upgCoinsVal').textContent=SV.coins;
  const list=document.getElementById('upgradeList');list.innerHTML='';
  for(const upg of UPGRADES){
    const lv=SV.upgrades[upg.id]||0;const maxed=lv>=upg.levels.length;
    const card=document.createElement('div');card.className='upg-card';
    const next=maxed?null:upg.levels[lv];
    card.innerHTML=`<div class="upg-icon">${upg.icon}</div>
      <div class="upg-info">
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-lvl">NIV ${lv}/${upg.levels.length}${lv>0?' — '+upg.levels[lv-1].label:''}</div>
      </div>`;
    const btn=document.createElement('button');btn.className='upg-btn'+(maxed?' maxed':'');
    if(maxed){btn.textContent='MAX';btn.disabled=true;}
    else{
      btn.textContent=`🪙${next.cost}`;
      if(SV.coins<next.cost)btn.disabled=true;
      btn.addEventListener('click',()=>{
        if(SV.coins<next.cost)return;
        SV.coins-=next.cost;SV.upgrades[upg.id]=(SV.upgrades[upg.id]||0)+1;
        saveSave();SFX.buy();vib(20);renderUpgrades();
      });
    }
    card.appendChild(btn);list.appendChild(card);
  }
}

/* ── STATS ── */
function renderStats(){
  const list=document.getElementById('statsList');list.innerHTML='';
  const rows=[
    ['🏆 Meilleur score',SV.best],
    ['🎮 Parties jouées',SV.games],
    ['🪨 Tuyaux passés',SV.totalPipes],
    ['🪙 Pièces totales',SV.coins],
    ['🔥 Streak actuel',SV.streak+' jours'],
    ['🥷 Ninja',SV.ninjaUnlocked?'DÉBLOQUÉ':'EN COURS'],
  ];
  for(const[l,v]of rows){
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`<span class="stat-label">${l}</span><span class="stat-val">${v}</span>`;
    list.appendChild(row);
  }
}

/* ── EVENTS ── */
document.getElementById('btnPlay').addEventListener('click',e=>{e.stopPropagation();game&&game.tap();});
document.getElementById('btnReplay').addEventListener('click',e=>{e.stopPropagation();game&&game.startGame();});
document.getElementById('btnDeadMenu').addEventListener('click',e=>{e.stopPropagation();showMenu();});

document.getElementById('btnShop').addEventListener('click',e=>{e.stopPropagation();renderShop();document.getElementById('shopOverlay').classList.add('open');});
document.getElementById('btnCloseShop').addEventListener('click',e=>{e.stopPropagation();document.getElementById('shopOverlay').classList.remove('open');showMenu();});

document.getElementById('btnUpg').addEventListener('click',e=>{e.stopPropagation();renderUpgrades();document.getElementById('upgOverlay').classList.add('open');});
document.getElementById('btnCloseUpg').addEventListener('click',e=>{e.stopPropagation();document.getElementById('upgOverlay').classList.remove('open');showMenu();});

document.getElementById('btnStats').addEventListener('click',e=>{e.stopPropagation();renderStats();document.getElementById('statsOverlay').classList.add('open');});
document.getElementById('btnCloseStats').addEventListener('click',e=>{e.stopPropagation();document.getElementById('statsOverlay').classList.remove('open');showMenu();});

document.getElementById('btnNinjaEquip').addEventListener('click',e=>{
  e.stopPropagation();
  if(!SV.owned.includes('ninja'))SV.owned.push('ninja');
  SV.equipped='ninja';saveSave();SFX.equip();
  document.getElementById('ninjaUnlock').classList.remove('show');
});
document.getElementById('btnNinjaClose').addEventListener('click',e=>{
  e.stopPropagation();document.getElementById('ninjaUnlock').classList.remove('show');
});

document.getElementById('btnCloseDailyBanner').addEventListener('click',e=>{
  e.stopPropagation();document.getElementById('dailyBanner').classList.remove('show');
});

/* ── TAP ── */
function handleTap(e){
  if(anyOverlayOpen())return;
  if(e.target.closest('#menuScreen,#deadScreen,#pauseBanner'))return;
  e.preventDefault();e.stopPropagation();
  try{const ac=getAC();if(ac&&ac.state==='suspended')ac.resume();}catch(e){}
  game&&game.tap();
}
document.addEventListener('touchstart',handleTap,{passive:false});
document.addEventListener('mousedown',handleTap);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();game&&game.tap();}
  if(e.code==='Escape'||e.code==='KeyP'){if(game){if(game.paused)game._unpause();else game._pause();}}
});

document.addEventListener('visibilitychange',()=>{if(document.hidden&&game)game._pause();else if(game)game._unpause();});
window.addEventListener('blur',()=>game&&game._pause());
window.addEventListener('focus',()=>game&&game._unpause());

/* ── RESIZE ── */
ctx.imageSmoothingEnabled=false;
function getCS(){return{w:document.documentElement.clientWidth,h:document.documentElement.clientHeight};}
let resT=null;
function onResize(){clearTimeout(resT);resT=setTimeout(()=>{const{w,h}=getCS();canvas.width=w;canvas.height=h;ctx.imageSmoothingEnabled=false;game&&game.resize(w,h);},200);}
window.addEventListener('resize',onResize);window.addEventListener('orientationchange',onResize);

/* ── BOOT ── */
const{w:IW,h:IH}=getCS();
canvas.width=IW;canvas.height=IH;
ctx.imageSmoothingEnabled=false;

const game=new Game(IW,IH);

// Daily reward
const daily=checkDaily();
if(daily){
  document.getElementById('dailyMsg').innerHTML=
    `🎁 BONUS QUOTIDIEN: +🪙${daily.coins}<br>🔥 STREAK: ${daily.streak} JOUR${daily.streak>1?'S':''} !`;
  SFX.daily();
  setTimeout(()=>document.getElementById('dailyBanner').classList.add('show'),600);
  setTimeout(()=>document.getElementById('dailyBanner').classList.remove('show'),5000);
}

// Ninja owned check
if(SV.ninjaUnlocked&&!SV.owned.includes('ninja')){SV.owned.push('ninja');saveSave();}

showMenu();
document.getElementById('hud').classList.remove('playing');
game.loop();
</script>
