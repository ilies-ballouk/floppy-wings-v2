<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Floppy Wings" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Floppy Wings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --neon-yellow: #ffe600;
      --neon-cyan:   #00f5ff;
      --neon-pink:   #ff006e;
      --neon-green:  #39ff14;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameWrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      max-height: 100dvh;
      max-width: 100vw;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #hudRow {
      margin-top: calc(env(safe-area-inset-top, 12px) + 12px);
      display: flex;
      gap: clamp(14px, 5vw, 32px);
      align-items: baseline;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #hudRow.visible { opacity: 1; }

    #scoreDisplay {
      font-size: clamp(20px, 6vw, 32px);
      color: var(--neon-yellow);
      /* Pas de text-shadow coûteux sur iOS */
      letter-spacing: 2px;
    }

    #bestHud {
      font-size: clamp(9px, 2.5vw, 13px);
      color: rgba(255,230,0,0.55);
      letter-spacing: 1px;
    }

    #screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.4s;
    }
    #screen.hidden { opacity: 0; pointer-events: none; }

    .screen-title {
      font-size: clamp(18px, 5vw, 28px);
      color: var(--neon-cyan);
      text-align: center;
      line-height: 1.6;
      animation: pulse 2s ease-in-out infinite;
    }

    .screen-subtitle {
      font-size: clamp(9px, 2.5vw, 13px);
      color: var(--neon-pink);
      text-align: center;
      line-height: 2;
      letter-spacing: 1px;
    }

    .best-score {
      font-size: clamp(8px, 2.2vw, 11px);
      color: var(--neon-yellow);
    }

    .tap-hint {
      font-size: clamp(9px, 2.4vw, 12px);
      color: #fff;
      opacity: 0.7;
      animation: blink 1.2s step-end infinite;
    }

    #pauseBanner {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #pauseBanner.visible { opacity: 1; }
    #pauseBanner span {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 4vw, 24px);
      color: var(--neon-cyan);
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 1; }
    }

    #medalArea { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .medal-emoji { font-size: clamp(30px, 10vw, 50px); }
  </style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="ui">
  <div id="hudRow">
    <div id="scoreDisplay">0</div>
    <div id="bestHud"></div>
  </div>
</div>

<div id="screen">
  <div class="screen-title" id="screenTitle">FLOPPY<br>WINGS</div>
  <div id="medalArea"></div>
  <div class="screen-subtitle" id="screenSub"></div>
  <div class="best-score" id="bestScoreEl"></div>
  <div class="tap-hint" id="tapHint">— TOUCHE POUR JOUER —</div>
</div>

<div id="pauseBanner"><span>⏸ PAUSE</span></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   FLOPPY WINGS — version iOS optimisée
   Optimisations appliquées :
   - NaN guards sur globalAlpha et toutes les valeurs canvas
   - "transparent" → rgba(0,0,0,0)
   - shadowBlur supprimé partout (coûteux sur iOS GPU)
   - ctx.save()/restore() réduits au minimum
   - Particules allégées (12 max, plus simples)
   - Effets post-mort arrêtés (trail, glow, explosion)
   - try/catch dans la boucle requestAnimationFrame
   - imageSmoothingEnabled = false
   - Dimensions via document.documentElement.clientWidth/Height
   - Gradients canvas réduits (un seul gradient par objet)
   - Étoiles réduites (50 au lieu de 80)
═══════════════════════════════════════════════════════════════ */

const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const scoreEl  = document.getElementById('scoreDisplay');
const bestHud  = document.getElementById('bestHud');
const hudRow   = document.getElementById('hudRow');
const screen   = document.getElementById('screen');
const screenTitle  = document.getElementById('screenTitle');
const screenSub    = document.getElementById('screenSub');
const bestScoreEl  = document.getElementById('bestScoreEl');
const medalArea    = document.getElementById('medalArea');
const tapHint      = document.getElementById('tapHint');
const pauseBanner  = document.getElementById('pauseBanner');

/* ── Utilitaire : clamp sécurisé pour globalAlpha ──────────── */
function safeAlpha(v) {
  if (!isFinite(v)) return 0;
  return Math.max(0, Math.min(1, v));
}

/* ── Dimensions fiables iOS ─────────────────────────────────── */
function getW() { return document.documentElement.clientWidth; }
function getH() { return document.documentElement.clientHeight; }

/* ── Son synthétique minimal ────────────────────────────────── */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, type, duration, vol) {
  try {
    const ac = getAudio();
    if (!ac || ac.state === 'suspended') return;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ac.currentTime + duration);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}
function sfxFlap()  { playTone(420, 'sine',     0.08, 0.12); }
function sfxScore() { playTone(880, 'square',   0.1,  0.10); }
function sfxDie()   { playTone(180, 'sawtooth', 0.45, 0.20); }

/* ── Stars (50, sans shadowBlur) ───────────────────────────── */
class Stars {
  constructor(W, H) { this.reset(W, H); }
  reset(W, H) {
    this.W = W; this.H = H;
    this.stars = Array.from({length: 50}, () => ({
      x: Math.random() * W,
      y: Math.random() * H * 0.7,
      r: Math.random() * 1.6 + 0.3,
      alpha: Math.random() * 0.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.018 + 0.004
    }));
  }
  update() {
    for (const s of this.stars) {
      s.twinkle += s.speed;
      s.alpha = 0.3 + 0.5 * Math.abs(Math.sin(s.twinkle));
    }
  }
  draw(ctx) {
    ctx.fillStyle = '#fff';
    for (const s of this.stars) {
      ctx.globalAlpha = safeAlpha(s.alpha);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

/* ── Bird (trail court, glow supprimé, sans shadowBlur) ─────── */
class Bird {
  constructor(x, y, size) {
    this.startX = x; this.startY = y; this.size = size;
    this.reset();
  }
  reset() {
    this.x = this.startX;
    this.y = this.startY;
    this.vy = 0;
    this.angle = 0;
    this.wingAngle = 0;
    this.wingDir = 1;
    this.trail = [];
    this.alive = true;
    this.stunned = false;
    this.deathTimer = 0;
  }
  flap(gravity) {
    if (!this.alive || this.stunned) return;
    this.vy = -gravity * 10.5;
    this.wingAngle = -0.8;
    sfxFlap();
  }
  stun() {
    this.stunned = true;
    this.vy = 2;
    sfxDie();
  }
  update(gravity, H, groundH) {
    if (!this.alive) {
      this.vy += gravity;
      this.y  += this.vy;
      if (!isFinite(this.y)) this.y = H - groundH - this.size / 2;
      this.angle = Math.min(1.5, this.angle + 0.08);
      const groundY = H - groundH - this.size / 2;
      if (this.y >= groundY) { this.y = groundY; this.vy = 0; }
      return;
    }
    this.vy += gravity;
    this.y  += this.vy;
    if (!isFinite(this.y)) this.y = H * 0.45;
    this.angle = Math.max(-0.5, Math.min(1.2, this.vy * 0.07));

    if (this.y - this.size / 2 <= 0) {
      this.y = this.size / 2;
      this.vy = 0;
      if (!this.stunned) this.stun();
      return;
    }
    if (this.y + this.size / 2 >= H - groundH) {
      this.y       = H - groundH - this.size / 2;
      this.alive   = false;
      this.stunned = false;
      return;
    }

    if (!this.stunned) {
      this.wingAngle += this.wingDir * 0.18;
      if (this.wingAngle >  0.5) this.wingDir = -1;
      if (this.wingAngle < -0.8) this.wingDir =  1;
      /* Trail réduit à 5 points */
      this.trail.unshift({x: this.x, y: this.y});
      if (this.trail.length > 5) this.trail.pop();
    }
  }

  draw(ctx) {
    const s = this.size;

    /* Trail simple (uniquement en vie, sans glow) */
    if (this.alive && !this.stunned && this.trail.length > 0) {
      ctx.fillStyle = '#ffe600';
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        ctx.globalAlpha = safeAlpha((1 - i / 5) * 0.3);
        ctx.beginPath();
        ctx.ellipse(t.x, t.y, s * 0.28, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    /* Corps — un seul gradient radial (pas de glow externe) */
    const bodyGrd = ctx.createRadialGradient(-s*0.1, -s*0.1, s*0.05, 0, 0, s*0.52);
    bodyGrd.addColorStop(0, '#fff7a0');
    bodyGrd.addColorStop(0.6, '#ffe600');
    bodyGrd.addColorStop(1, '#ff8c00');
    ctx.fillStyle = bodyGrd;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.52, s * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = s * 0.05;
    ctx.stroke();

    /* Aile */
    ctx.rotate(this.wingAngle);
    ctx.fillStyle = '#ffc107';
    ctx.beginPath();
    ctx.ellipse(-s * 0.1, s * 0.15, s * 0.28, s * 0.16, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.rotate(-this.wingAngle);

    /* Œil */
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * 0.22, -s * 0.1, s * 0.17, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(s * 0.27, -s * 0.08, s * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * 0.30, -s * 0.12, s * 0.04, 0, Math.PI * 2);
    ctx.fill();

    /* Bec */
    ctx.fillStyle = '#ff6d00';
    ctx.beginPath();
    ctx.moveTo(s * 0.45, -s * 0.04);
    ctx.lineTo(s * 0.72,  s * 0.02);
    ctx.lineTo(s * 0.45,  s * 0.1);
    ctx.closePath();
    ctx.fill();

    /* Joue */
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#ff8080';
    ctx.beginPath();
    ctx.ellipse(s * 0.15, s * 0.1, s * 0.12, s * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  getRadius() { return this.size * 0.38; }
}

/* ── Pipe (gradients simplifiés, sans shadowBlur) ───────────── */
class Pipe {
  constructor(x, gap, gapY, W, H, groundH, pipeW) {
    this.x = x; this.gap = gap; this.gapY = gapY;
    this.W = W; this.H = H; this.groundH = groundH;
    this.pipeW = pipeW;
    this.scored = false;
    this.speed  = 0;
  }
  update() { this.x -= this.speed; }
  isOffscreen() { return this.x + this.pipeW < 0; }

  draw(ctx) {
    const pw   = this.pipeW;
    const capH = pw * 0.28;
    const topBot = this.gapY - this.gap / 2;
    const botTop = this.gapY + this.gap / 2;
    const groundT = this.H - this.groundH;
    this._drawPipe(ctx, this.x, 0,      pw, topBot,          capH, true);
    this._drawPipe(ctx, this.x, botTop, pw, groundT - botTop, capH, false);
  }

  _drawPipe(ctx, x, y, w, h, capH, isTop) {
    if (h <= 0) return;
    const innerX = x + w * 0.1;
    const innerW = w * 0.8;

    /* Corps (couleur plate + léger dégradé vertical = 1 seul gradient) */
    const bodyY = isTop ? y        : y + capH;
    const bodyH = isTop ? h - capH : h - capH;
    if (bodyH > 0) {
      ctx.fillStyle = '#00a040';
      ctx.fillRect(innerX, bodyY, innerW, bodyH);
      /* Reflet simple */
      ctx.fillStyle = 'rgba(100,255,160,0.18)';
      ctx.fillRect(innerX + innerW * 0.1, bodyY, innerW * 0.2, bodyH);
    }

    /* Chapeau */
    const capY = isTop ? h - capH : y;
    ctx.fillStyle = '#00c853';
    ctx.beginPath();
    const r = 5;
    if (isTop) ctx.roundRect(x, capY, w, capH, [0, 0, r, r]);
    else        ctx.roundRect(x, capY, w, capH, [r, r, 0, 0]);
    ctx.fill();

    /* Reflet chapeau */
    ctx.fillStyle = 'rgba(180,255,200,0.25)';
    ctx.beginPath();
    if (isTop) ctx.roundRect(x + w * 0.1, capY + 3, w * 0.2, capH - 6, [0, 0, 3, 3]);
    else        ctx.roundRect(x + w * 0.1, capY + 3, w * 0.2, capH - 6, [3, 3, 0, 0]);
    ctx.fill();
  }

  collidesWithCircle(cx, cy, cr) {
    if (cx + cr > this.x && cx - cr < this.x + this.pipeW) {
      if (cy - cr < this.gapY - this.gap / 2 || cy + cr > this.gapY + this.gap / 2) {
        return true;
      }
    }
    return false;
  }
}

/* ── Particle (simplifiée, 12 max) ─────────────────────────── */
class Particle {
  constructor(x, y) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 2;
    this.life  = 1;
    this.color = ['#ffe600','#ff006e','#00f5ff','#39ff14'][Math.floor(Math.random()*4)];
    this.r = Math.random() * 4 + 2;
  }
  update() {
    this.x  += this.vx;
    this.vy += 0.28;
    this.y  += this.vy;
    this.life -= 0.04; /* s'estompe plus vite */
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.globalAlpha = safeAlpha(this.life);
    ctx.fillStyle   = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.5, this.r * this.life), 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ── Ground (sans shadowBlur) ───────────────────────────────── */
class Ground {
  constructor(H, groundH) { this.H = H; this.groundH = groundH; this.offset = 0; }
  update(speed, moving) { if (moving) this.offset = (this.offset + speed) % 40; }
  draw(ctx, W) {
    const y = this.H - this.groundH;
    /* Couleur plate + 1 gradient vertical */
    const grd = ctx.createLinearGradient(0, y, 0, this.H);
    grd.addColorStop(0, '#1a0a3e');
    grd.addColorStop(1, '#0a0520');
    ctx.fillStyle = grd;
    ctx.fillRect(0, y, W, this.groundH);

    /* Ligne du sol */
    ctx.strokeStyle = '#7c00ff';
    ctx.lineWidth   = 2.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();

    /* Grille minimaliste */
    ctx.strokeStyle = 'rgba(124,0,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = -this.offset; x < W; x += 40) {
      ctx.moveTo(x, y); ctx.lineTo(x, this.H);
    }
    for (let row = y + 20; row < this.H; row += 20) {
      ctx.moveTo(0, row); ctx.lineTo(W, row);
    }
    ctx.stroke();
  }
}

/* ── Worlds (nébuleuses allégées, sans shadowBlur) ──────────── */
function hexToRgb(h) {
  h = h.replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function lerpColor(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  return `rgb(${Math.round(ca[0]+(cb[0]-ca[0])*t)},${Math.round(ca[1]+(cb[1]-ca[1])*t)},${Math.round(ca[2]+(cb[2]-ca[2])*t)})`;
}

const WORLDS = [
  { name:'ESPACE',           skyTop:'#05051a', skyBot:'#1a0a3e', labelColor:'#00f5ff',
    nebulas:[{x:.25,y:.2,r:.3,color:'rgba(80,0,200,0.07)'},{x:.72,y:.45,r:.25,color:'rgba(0,80,200,0.06)'}]},
  { name:'AURORE',           skyTop:'#001a10', skyBot:'#003d1f', labelColor:'#39ff14',
    nebulas:[{x:.5,y:.25,r:.4,color:'rgba(0,255,100,0.07)'},{x:.8,y:.5,r:.28,color:'rgba(100,255,0,0.05)'}]},
  { name:'COUCHER DE SOLEIL',skyTop:'#1a0500', skyBot:'#3d1500', labelColor:'#ff6d00',
    nebulas:[{x:.5,y:.3,r:.45,color:'rgba(255,100,0,0.09)'},{x:.15,y:.6,r:.28,color:'rgba(255,50,0,0.06)'}]},
  { name:'OCEAN PROFOND',    skyTop:'#000d1a', skyBot:'#001a33', labelColor:'#00b8ff',
    nebulas:[{x:.3,y:.3,r:.35,color:'rgba(0,100,255,0.08)'},{x:.75,y:.55,r:.3,color:'rgba(0,200,255,0.05)'}]},
  { name:'VOLCAN',           skyTop:'#1a0000', skyBot:'#3d0500', labelColor:'#ff1744',
    nebulas:[{x:.5,y:.75,r:.42,color:'rgba(255,50,0,0.1)'},{x:.2,y:.4,r:.28,color:'rgba(200,0,0,0.07)'}]},
  { name:'GALAXIE',          skyTop:'#0a001a', skyBot:'#1a0033', labelColor:'#ea00ff',
    nebulas:[{x:.4,y:.3,r:.4,color:'rgba(180,0,255,0.09)'},{x:.75,y:.6,r:.32,color:'rgba(255,0,150,0.07)'}]},
];

/* ═══════════════════════════════════════════════════════════════
   GAME
═══════════════════════════════════════════════════════════════ */
class Game {
  constructor(W, H) {
    this.bestScore = parseInt(localStorage.getItem('floppyBest') || '0');
    this.state = 'menu';
    this.particles = [];
    this.flashing  = 0;
    this._build(W, H);
    this.updateBestDisplay();
    this.showMenuScreen();
  }

  _build(W, H) {
    this.W = W; this.H = H;
    this.groundH  = Math.max(60, H * 0.1);
    this.birdSize = Math.min(W, H) * 0.09;
    this.pipeW    = Math.min(W * 0.14, 72);
    this.pipeGap  = Math.min(H * 0.32, 210);
    this.gravity  = H * 0.00055;
    this.baseSpeed = W * 0.0065;

    this.stars  = new Stars(W, H);
    this.ground = new Ground(H, this.groundH);
    this.bird   = new Bird(W * 0.25, H * 0.45, this.birdSize);
    this.pipes  = [];

    this.pipeSepPx  = W * 0.75;
    this.nextPipeX  = W + this.pipeW;

    this.score      = 0;
    this.speed      = this.baseSpeed;
    this.frameCount = 0;

    this.worldIndex       = 0;
    this.worldTransition  = 1;
    this.worldTransitioning = false;
    this.worldLabelAlpha  = 0;
    this.worldLabelTimer  = 0;

    /* Cache du gradient de fond pour éviter de le recréer à chaque frame */
    this._bgGrd     = null;
    this._bgGrdKey  = '';
  }

  resize(W, H) {
    const wasPlaying = this.state === 'playing';
    this._build(W, H);
    if (wasPlaying) this.start();
  }

  showMenuScreen() {
    screen.classList.remove('hidden');
    screenTitle.innerHTML = 'FLOPPY<br>WINGS';
    screenSub.innerHTML   = '';
    medalArea.innerHTML   = '';
    tapHint.textContent   = '— TOUCHE POUR JOUER —';
    hudRow.classList.remove('visible');
    this.updateBestDisplay();
  }

  showDeadScreen(score) {
    screen.classList.remove('hidden');
    hudRow.classList.remove('visible');
    let medal = '';
    if      (score >= 30) medal = '🏆';
    else if (score >= 15) medal = '🥇';
    else if (score >= 7)  medal = '🥈';
    else if (score >= 3)  medal = '🥉';
    medalArea.innerHTML = medal ? `<div class="medal-emoji">${medal}</div>` : '';
    screenSub.innerHTML = `SCORE: <span style="color:#ffe600">${score}</span>`;
    tapHint.textContent = '— REJOUER —';
    this.updateBestDisplay();
  }

  updateBestDisplay() {
    bestScoreEl.textContent = this.bestScore > 0 ? `MEILLEUR: ${this.bestScore}` : '';
    bestHud.textContent     = this.bestScore > 0 ? `↑${this.bestScore}` : '';
  }

  start() {
    this.bird      = new Bird(this.W * 0.25, this.H * 0.45, this.birdSize);
    this.pipes     = [];
    this.particles = [];
    this.score     = 0;
    this.speed     = this.baseSpeed;
    this.frameCount = 0;
    this.flashing   = 0;
    this.worldIndex = 0;
    this.worldTransition = 1;
    this.worldTransitioning = false;
    this.worldLabelAlpha = 0;
    this.worldLabelTimer = 0;
    this.nextPipeX = this.W + this.pipeW;
    this._bgGrd    = null;
    this._bgGrdKey = '';

    this.state = 'playing';
    screen.classList.add('hidden');
    hudRow.classList.add('visible');
    scoreEl.textContent = '0';
    this.updateBestDisplay();
  }

  tap() {
    if (this.paused) { this._unpause(); return; }
    if (this.state === 'menu') { this.start(); return; }
    if (this.state === 'dead') { this.start(); return; }
    if (this.state === 'playing' && this.bird.alive) {
      this.bird.flap(this.gravity);
    }
  }

  spawnPipe() {
    const minY = this.H * 0.22;
    const maxY = this.H - this.groundH - this.pipeGap * 0.6;
    const gapY = minY + Math.random() * (maxY - minY);
    const p = new Pipe(this.nextPipeX, this.pipeGap, gapY, this.W, this.H, this.groundH, this.pipeW);
    p.speed = this.speed;
    this.pipes.push(p);
    this.nextPipeX += this.pipeSepPx;
  }

  _pause() {
    if (this.state !== 'playing' || !this.bird.alive) return;
    this.paused = true;
    pauseBanner.classList.add('visible');
  }
  _unpause() {
    this.paused = false;
    pauseBanner.classList.remove('visible');
  }

  update() {
    if (this.paused) return;
    this.stars.update();
    if (this.state !== 'playing') return;

    this.frameCount++;
    this.speed = Math.min(this.baseSpeed * 2.5, this.baseSpeed + this.score * 0.006);

    const birdMoving = this.bird.alive && !this.bird.stunned;

    if (birdMoving) {
      for (const p of this.pipes) { p.speed = this.speed; p.update(); }
    }
    this.pipes = this.pipes.filter(p => !p.isOffscreen());

    if (birdMoving) {
      if (this.pipes.length === 0) {
        this.nextPipeX = this.W + this.pipeW;
        this.spawnPipe();
      }
      this.nextPipeX -= this.speed;
      if (this.nextPipeX <= this.W + this.pipeW) {
        this.nextPipeX = this.W + this.pipeW + this.pipeSepPx;
        this.spawnPipe();
      }
    }

    this.bird.update(this.gravity, this.H, this.groundH);
    this.ground.update(this.speed, birdMoving);

    if (this.bird.alive) {
      for (const p of this.pipes) {
        if (!p.scored && p.x + p.pipeW < this.bird.x) {
          p.scored = true;
          this.score++;
          scoreEl.textContent = this.score;
          sfxScore();
          if (this.score > this.bestScore) {
            this.bestScore = this.score;
            localStorage.setItem('floppyBest', this.bestScore);
            this.updateBestDisplay();
          }
          if (this.score % 20 === 0) {
            this.worldIndex = Math.min(this.worldIndex + 1, WORLDS.length - 1);
            this.worldTransition    = 0;
            this.worldTransitioning = true;
            this.worldLabelTimer    = 120;
            this._bgGrd    = null; /* invalide le cache */
            this._bgGrdKey = '';
          }
        }
      }
    }

    if (this.worldTransitioning) {
      this.worldTransition = Math.min(1, this.worldTransition + 0.012);
      if (this.worldTransition >= 1) this.worldTransitioning = false;
    }
    if (this.worldLabelTimer > 0) {
      this.worldLabelTimer--;
      const t = this.worldLabelTimer / 120;
      this.worldLabelAlpha = t < 0.2 ? t / 0.2 : t > 0.8 ? (1 - t) / 0.2 : 1;
    } else {
      this.worldLabelAlpha = 0;
    }

    /* Collision tuyau */
    if (this.bird.alive && !this.bird.stunned) {
      const cr = this.bird.getRadius();
      for (const p of this.pipes) {
        if (p.collidesWithCircle(this.bird.x, this.bird.y, cr)) {
          this.bird.stun();
          this.explode(this.bird.x, this.bird.y);
          break;
        }
      }
    }

    /* Mort confirmée quand l'oiseau touche le sol */
    if (!this.bird.alive) {
      this.bird.deathTimer++;
      /* Arrête les particules dès que l'oiseau est mort pour alléger */
      if (this.bird.deathTimer >= 90) {
        this.state = 'dead';
        this.showDeadScreen(this.score);
      }
    }

    if (this.flashing > 0) this.flashing--;

    /* Mise à jour particules uniquement si en vie (allège post-mort) */
    if (this.bird.alive || this.bird.deathTimer < 30) {
      this.particles = this.particles.filter(p => p.life > 0);
      for (const p of this.particles) p.update();
    } else {
      this.particles = [];
    }
  }

  explode(x, y) {
    /* 12 particules max au lieu de 28 */
    const count = Math.min(12, 28);
    for (let i = 0; i < count; i++) this.particles.push(new Particle(x, y));
    this.flashing = 6;
  }

  drawBackground() {
    const wi   = this.worldIndex;
    const wPrev = Math.max(0, wi - 1);
    const t    = this.worldTransitioning ? this.worldTransition : 1;
    const w0   = WORLDS[wPrev];
    const w1   = WORLDS[wi];

    const skyTop = lerpColor(w0.skyTop, w1.skyTop, t);
    const skyBot = lerpColor(w0.skyBot, w1.skyBot, t);

    /* Cache du gradient de fond : on ne le recrée que si les couleurs changent */
    const grdKey = skyTop + skyBot;
    if (grdKey !== this._bgGrdKey) {
      this._bgGrd = ctx.createLinearGradient(0, 0, 0, this.H - this.groundH);
      this._bgGrd.addColorStop(0, skyTop);
      this._bgGrd.addColorStop(1, skyBot);
      this._bgGrdKey = grdKey;
    }
    ctx.fillStyle = this._bgGrd;
    ctx.fillRect(0, 0, this.W, this.H);

    /* Nébuleuses : max 2 par monde, alpha sécurisé, sans shadowBlur */
    for (const n of w1.nebulas) {
      const alpha = safeAlpha((n.a !== undefined ? n.a : 1) * t);
      if (alpha < 0.01) continue;
      ctx.globalAlpha = alpha;
      const g = ctx.createRadialGradient(
        this.W*n.x, this.H*n.y, 0,
        this.W*n.x, this.H*n.y, this.W*n.r
      );
      g.addColorStop(0, n.color);
      g.addColorStop(1, 'rgba(0,0,0,0)'); /* remplace "transparent" */
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(this.W*n.x, this.H*n.y, this.W*n.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* Label monde en bas, dans la zone sol */
    if (this.worldLabelAlpha > 0.01) {
      const maxFontPx = Math.round(this.W * 0.045);
      const name = WORLDS[wi].name;
      ctx.globalAlpha = safeAlpha(this.worldLabelAlpha);
      ctx.fillStyle    = WORLDS[wi].labelColor || '#fff';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      let fontSize = maxFontPx;
      ctx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
      while (ctx.measureText(name).width > this.W * 0.88 && fontSize > 8) {
        fontSize--;
        ctx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
      }
      const labelY = this.H - this.groundH / 2;
      ctx.fillText(name, this.W / 2, labelY);
      ctx.globalAlpha = 1;
    }
  }

  draw() {
    ctx.clearRect(0, 0, this.W, this.H);

    /* Flash de collision simplifié */
    if (this.flashing > 0 && this.flashing % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(0, 0, this.W, this.H);
    }

    this.drawBackground();
    this.stars.draw(ctx);
    for (const p of this.pipes) p.draw(ctx);
    this.ground.draw(ctx, this.W);
    this.bird.draw(ctx);

    /* Particules : rendu groupé (un seul globalAlpha set par particule) */
    if (this.particles.length > 0) {
      for (const p of this.particles) p.draw(ctx);
      ctx.globalAlpha = 1;
    }
  }

  loop() {
    try {
      this.update();
      this.draw();
    } catch(e) {
      /* Protection anti-crash iOS : on loggue mais on continue */
      console.warn('Game loop error:', e);
    }
    requestAnimationFrame(() => this.loop());
  }
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
let game;

/* imageSmoothingEnabled = false pour iOS */
ctx.imageSmoothingEnabled = false;

/* Dimensions fiables iOS via document.documentElement */
function getCanvasSize() {
  return {
    w: document.documentElement.clientWidth,
    h: document.documentElement.clientHeight
  };
}

let resizeTimer = null;
function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const { w, h } = getCanvasSize();
    canvas.width  = w;
    canvas.height = h;
    /* Re-set après resize (iOS remet à true) */
    ctx.imageSmoothingEnabled = false;
    if (game) game.resize(w, h);
  }, 200);
}
window.addEventListener('resize',            onResize);
window.addEventListener('orientationchange', onResize);

const { w: IW, h: IH } = getCanvasSize();
canvas.width  = IW;
canvas.height = IH;
ctx.imageSmoothingEnabled = false;
game = new Game(IW, IH);

/* Pause automatique à la perte de focus */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) game._pause();
  else                 game._unpause();
});
window.addEventListener('blur',  () => game._pause());
window.addEventListener('focus', () => game._unpause());

function handleTap(e) {
  e.preventDefault();
  e.stopPropagation();
  /* Déverrouille l'AudioContext sur iOS au premier tap */
  try {
    const ac = getAudio();
    if (ac && ac.state === 'suspended') ac.resume();
  } catch(e) {}
  game.tap();
}
document.addEventListener('touchstart', handleTap, { passive: false });
document.addEventListener('mousedown',  handleTap);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); game.tap(); }
  if (e.code === 'Escape' || e.code === 'KeyP') {
    if (game.paused) game._unpause(); else game._pause();
  }
});

game.loop();
</script>
