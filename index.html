<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Floppy Wings</title>

<style>
html, body {
  margin:0; padding:0;
  background:#0a0a1a;
  overflow:hidden;
  touch-action:none;
}

body {
  overscroll-behavior:none;
}

canvas {
  display:block;
  max-width:100vw;
  max-height:100vh;
  max-height:100dvh;
}
</style>
</head>

<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

/* ---------- SAFE RESIZE ---------- */
function resize(){
  const W = document.documentElement.clientWidth;
  const H = document.documentElement.clientHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

/* ---------- AUDIO FIX IOS ---------- */
let audioCtx = null;
function getAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}
function resumeAudio(){
  if(audioCtx && audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

/* ---------- BIRD ---------- */
class Bird{
  constructor(){
    this.reset();
  }
  reset(){
    this.x = canvas.width*0.25;
    this.y = canvas.height*0.4;
    this.vy = 0;
    this.size = canvas.width*0.08;
    this.alive = true;
  }
  flap(){
    this.vy = -8;
  }
  update(){
    this.vy += 0.4;
    this.y += this.vy;

    if(this.y < 0) this.y = 0;

    if(this.y > canvas.height-50){
      this.y = canvas.height-50;
      this.alive = false;
    }
  }
  draw(){
    ctx.fillStyle = "#ffe600";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size*0.4, 0, Math.PI*2);
    ctx.fill();
  }
}

/* ---------- PIPE ---------- */
class Pipe{
  constructor(x){
    this.x = x;
    this.w = 60;
    this.gap = 160;
    this.gapY = Math.random()*(canvas.height-200)+100;
    this.speed = 3;
    this.scored = false;
  }
  update(){
    this.x -= this.speed;
  }
  draw(){
    ctx.fillStyle="#00c853";

    // haut
    ctx.fillRect(this.x, 0, this.w, this.gapY-this.gap/2);

    // bas
    ctx.fillRect(this.x, this.gapY+this.gap/2, this.w, canvas.height);
  }
}

/* ---------- GAME ---------- */
class Game{
  constructor(){
    this.bird = new Bird();
    this.pipes = [];
    this.frame = 0;
    this.score = 0;
    this.state = "menu";
    this.paused = false;
  }

  start(){
    this.bird.reset();
    this.pipes = [];
    this.score = 0;
    this.frame = 0;
    this.state = "play";
  }

  tap(){
    resumeAudio();

    if(this.state==="menu" || this.state==="dead"){
      this.start();
      return;
    }

    if(this.state==="play"){
      this.bird.flap();
    }
  }

  spawn(){
    this.pipes.push(new Pipe(canvas.width));
  }

  collide(pipe){
    const bx = this.bird.x;
    const by = this.bird.y;
    const r  = this.bird.size*0.4;

    // collision simple
    if(
      bx+r > pipe.x &&
      bx-r < pipe.x+pipe.w
    ){
      if(
        by-r < pipe.gapY-pipe.gap/2 ||
        by+r > pipe.gapY+pipe.gap/2
      ){
        return true;
      }
    }
    return false;
  }

  update(){
    if(this.paused) return;

    if(this.state!=="play") return;

    this.frame++;

    if(this.frame % 90 === 0){
      this.spawn();
    }

    this.bird.update();

    // pipes
    this.pipes.forEach(p=>{
      p.update();

      // score
      if(!p.scored && p.x < this.bird.x){
        p.scored = true;
        this.score++;
      }

      // collision
      if(this.collide(p)){
        this.state="dead";
      }
    });

    // cleanup
    this.pipes = this.pipes.filter(p=>p.x+p.w>0);
  }

  draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background
    const g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,"#05051a");
    g.addColorStop(1,"#1a0a3e");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    this.bird.draw();
    this.pipes.forEach(p=>p.draw());

    // score
    ctx.fillStyle="#fff";
    ctx.font="20px monospace";
    ctx.fillText(this.score,20,30);

    if(this.state==="menu"){
      ctx.fillText("TAP TO PLAY", canvas.width/2-60, canvas.height/2);
    }

    if(this.state==="dead"){
      ctx.fillText("GAME OVER", canvas.width/2-70, canvas.height/2);
    }
  }

  loop(){
    try{
      this.update();
      this.draw();
    }catch(e){
      console.error("Crash évité", e);
      this.state="dead";
    }

    requestAnimationFrame(()=>this.loop());
  }
}

/* ---------- INIT ---------- */
const game = new Game();
game.loop();

/* ---------- INPUT ---------- */
function tap(e){
  e.preventDefault();
  game.tap();
}

document.addEventListener("touchstart", tap, {passive:false});
document.addEventListener("mousedown", tap);
document.addEventListener("keydown", e=>{
  if(e.code==="Space") game.tap();
});

/* ---------- PAUSE AUTO ---------- */
document.addEventListener("visibilitychange", ()=>{
  game.paused = document.hidden;
});
</script>
</body>
</html>
