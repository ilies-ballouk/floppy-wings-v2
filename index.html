<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Floppy Wings Neon</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#0a0a1a;
  overflow:hidden;
  touch-action:none;
}
body{overscroll-behavior:none;}
canvas{
  display:block;
  max-width:100vw;
  max-height:100vh;
  max-height:100dvh;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

/* ---------- RESIZE ---------- */
function resize(){
  const W = document.documentElement.clientWidth;
  const H = document.documentElement.clientHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

/* ---------- SAFE ALPHA ---------- */
function safeAlpha(a){
  return (isFinite(a) && a>=0 && a<=1) ? a : 1;
}

/* ---------- BIRD ---------- */
class Bird{
  constructor(){ this.reset(); }
  reset(){
    this.x = canvas.width*0.25;
    this.y = canvas.height*0.4;
    this.vy = 0;
    this.size = canvas.width*0.08;
    this.alive = true;
    this.angle = 0;
  }
  flap(){ this.vy = -8; }
  update(){
    this.vy += 0.4;
    this.y += this.vy;
    this.angle = Math.min(1, this.vy*0.08);

    if(this.y < 0) this.y = 0;
    if(this.y > canvas.height-60){
      this.y = canvas.height-60;
      this.alive = false;
    }
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    // glow léger SAFE
    ctx.shadowColor = "#ffe600";
    ctx.shadowBlur = 10;

    ctx.fillStyle="#ffe600";
    ctx.beginPath();
    ctx.arc(0,0,this.size*0.4,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;
  }
}

/* ---------- PIPE ---------- */
class Pipe{
  constructor(x){
    this.x = x;
    this.w = 60;
    this.gap = 160;
    this.gapY = Math.random()*(canvas.height-200)+100;
    this.speed = 3;
    this.scored=false;
  }
  update(){ this.x -= this.speed; }

  draw(){
    // gradient SAFE
    const g = ctx.createLinearGradient(this.x,0,this.x+this.w,0);
    g.addColorStop(0,"#005c2a");
    g.addColorStop(1,"#00e676");

    ctx.fillStyle=g;

    ctx.fillRect(this.x,0,this.w,this.gapY-this.gap/2);
    ctx.fillRect(this.x,this.gapY+this.gap/2,this.w,canvas.height);
  }
}

/* ---------- PARTICLES LIGHT ---------- */
class Particle{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*4;
    this.vy=(Math.random()-0.5)*4;
    this.life=1;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.life-=0.03;
  }
  draw(){
    ctx.globalAlpha = safeAlpha(this.life);
    ctx.fillStyle="#ffe600";
    ctx.fillRect(this.x,this.y,2,2);
    ctx.globalAlpha = 1;
  }
}

/* ---------- GAME ---------- */
class Game{
  constructor(){
    this.bird=new Bird();
    this.pipes=[];
    this.particles=[];
    this.frame=0;
    this.score=0;
    this.state="menu";
    this.paused=false;
  }

  start(){
    this.bird.reset();
    this.pipes=[];
    this.particles=[];
    this.score=0;
    this.frame=0;
    this.state="play";
  }

  tap(){
    if(this.state==="menu"||this.state==="dead"){
      this.start(); return;
    }
    if(this.state==="play"){
      this.bird.flap();
    }
  }

  spawn(){
    this.pipes.push(new Pipe(canvas.width));
  }

  collide(p){
    const r=this.bird.size*0.4;
    const bx=this.bird.x;
    const by=this.bird.y;

    if(bx+r>p.x && bx-r<p.x+p.w){
      if(by-r<p.gapY-p.gap/2 || by+r>p.gapY+p.gap/2){
        return true;
      }
    }
    return false;
  }

  explode(){
    const count = window.innerWidth<500 ? 12 : 20;
    for(let i=0;i<count;i++){
      this.particles.push(new Particle(this.bird.x,this.bird.y));
    }
  }

  update(){
    if(this.paused) return;
    if(this.state!=="play") return;

    this.frame++;

    if(this.frame%90===0) this.spawn();

    this.bird.update();

    let collision=false;

    this.pipes.forEach(p=>{
      p.update();

      if(!p.scored && p.x<this.bird.x){
        p.scored=true;
        this.score++;
      }

      if(this.collide(p)) collision=true;
    });

    if(collision && this.bird.alive){
      this.bird.alive=false;
      this.explode();
    }

    // STOP logique lourde après mort
    if(!this.bird.alive){
      if(this.frame%60===0){
        this.state="dead";
      }
    }

    this.pipes = this.pipes.filter(p=>p.x+p.w>0);

    this.particles = this.particles.filter(p=>p.life>0);
    this.particles.forEach(p=>p.update());
  }

  draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background SAFE
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,"#05051a");
    g.addColorStop(1,"#1a0a3e");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    this.pipes.forEach(p=>p.draw());
    this.bird.draw();
    this.particles.forEach(p=>p.draw());

    ctx.fillStyle="#fff";
    ctx.font="20px monospace";
    ctx.fillText(this.score,20,30);

    if(this.state==="menu"){
      ctx.fillText("TAP TO PLAY",canvas.width/2-60,canvas.height/2);
    }
    if(this.state==="dead"){
      ctx.fillText("GAME OVER",canvas.width/2-70,canvas.height/2);
    }
  }

  loop(){
    try{
      this.update();
      this.draw();
    }catch(e){
      console.error("crash évité",e);
      this.state="dead";
    }
    requestAnimationFrame(()=>this.loop());
  }
}

/* ---------- INIT ---------- */
const game=new Game();
game.loop();

/* ---------- INPUT ---------- */
function tap(e){
  e.preventDefault();
  game.tap();
}
document.addEventListener("touchstart",tap,{passive:false});
document.addEventListener("mousedown",tap);
document.addEventListener("keydown",e=>{
  if(e.code==="Space") game.tap();
});

/* ---------- PAUSE ---------- */
document.addEventListener("visibilitychange",()=>{
  game.paused=document.hidden;
});
</script>
</body>
</html>
